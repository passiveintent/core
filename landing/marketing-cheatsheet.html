<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marketing Cheat Sheet | PassiveIntent</title>
    <meta
      name="description"
      content="PassiveIntent marketing cheat sheet — messaging, positioning, and intent signal reference for growth, CX, and sales teams."
    />
    <meta name="robots" content="noindex,nofollow" />
    <meta name="theme-color" content="#f6f3ee" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <style>
      .md-shell {
        max-width: 780px;
        margin: 0 auto;
        padding: 48px 24px 96px;
      }

      .md-body h1 {
        font-size: 2rem;
        font-weight: 800;
        line-height: 1.2;
        margin: 0 0 0.5rem;
      }

      .md-body h2 {
        font-size: 1.25rem;
        font-weight: 700;
        margin: 2.5rem 0 0.75rem;
        padding-bottom: 0.4rem;
        border-bottom: 1px solid var(--line-strong);
      }

      .md-body h3 {
        font-size: 1rem;
        font-weight: 700;
        margin: 1.75rem 0 0.5rem;
        color: var(--muted-strong);
      }

      .md-body p {
        margin: 0.75rem 0;
        color: var(--text);
      }

      .md-body ul,
      .md-body ol {
        padding-left: 1.4rem;
        margin: 0.5rem 0 1rem;
      }

      .md-body li {
        margin-bottom: 0.35rem;
      }

      .md-body code {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.82rem;
        background: var(--accent-soft);
        color: var(--accent-strong);
        padding: 0.1em 0.4em;
        border-radius: 6px;
      }

      .md-body pre {
        background: var(--surface-dark);
        color: #e8eaf0;
        border-radius: var(--radius-md);
        padding: 1.25rem 1.5rem;
        overflow-x: auto;
        margin: 1rem 0;
      }

      .md-body pre code {
        background: none;
        color: inherit;
        padding: 0;
        font-size: 0.82rem;
      }

      .md-body blockquote {
        border-left: 3px solid var(--accent);
        margin: 1rem 0;
        padding: 0.5rem 1rem;
        background: var(--accent-soft);
        border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
        color: var(--muted-strong);
      }

      .md-body blockquote p {
        margin: 0;
      }

      .md-body table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.875rem;
        margin: 1rem 0 1.5rem;
      }

      .md-body th {
        text-align: left;
        font-weight: 700;
        padding: 0.6rem 0.75rem;
        background: var(--surface-dark);
        color: #e8eaf0;
      }

      .md-body td {
        padding: 0.55rem 0.75rem;
        border-bottom: 1px solid var(--line);
        vertical-align: top;
      }

      .md-body tr:last-child td {
        border-bottom: none;
      }

      .md-body hr {
        border: none;
        border-top: 1px solid var(--line-strong);
        margin: 2rem 0;
      }

      .md-body a {
        color: var(--accent);
        text-decoration: underline;
        text-underline-offset: 2px;
      }

      .md-body strong {
        font-weight: 700;
      }

      .md-loading,
      .md-error {
        text-align: center;
        padding: 4rem 1rem;
        color: var(--muted);
        font-size: 0.95rem;
      }

      .md-error {
        color: #c0392b;
      }
    </style>
  </head>
  <body>
    <div class="page-orb page-orb-a"></div>
    <div class="page-orb page-orb-b"></div>

    <header class="site-header" id="site-header">
      <div class="header-inner">
        <a class="brand" href="./index.html">
          <span class="brand-mark" aria-hidden="true"></span>
          <span class="brand-copy">
            <strong>PassiveIntent</strong>
            <span>Behavioral Intent Engine</span>
          </span>
        </a>
        <nav class="site-nav" aria-label="Cheat sheet page">
          <a href="./index.html#pricing">Pricing</a>
          <a href="./privacy.html">Privacy</a>
          <a href="./terms.html">Terms</a>
        </nav>
        <a class="header-cta" href="./index.html#demo">Try the live demo</a>
      </div>
    </header>

    <main class="md-shell">
      <div id="md-body" class="md-body">
        <p class="md-loading">Loading…</p>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
    <script>
      (async () => {
        const el = document.getElementById('md-body');
        try {
          const res = await fetch('./marketing-cheatsheet.md');
          if (!res.ok) throw new Error(res.status);
          const text = await res.text();
          el.innerHTML = marked.parse(text);
        } catch (e) {
          el.innerHTML =
            '<p class="md-error">Could not load the cheat sheet. Try refreshing or open the .md file directly.</p>';
        }
      })();
    </script>
  </body>
</html>
